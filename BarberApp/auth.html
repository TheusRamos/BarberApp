<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BarberApp | Autenticação</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="container hero-grid auth-page-grid">
      <div class="hero-content auth-copy">
        <div class="welcome-badge">
          <span class="welcome-dot"></span>
          <span class="welcome-text">BarberApp</span>
        </div>
        <h1 class="hero-title">Acesse sua <span>conta</span></h1>
        <p class="hero-description">Entre para agendar serviços, acompanhar horários marcados e acessar recursos de cliente ou administrador.</p>
      </div>

      <div class="form-panel">
        <div class="panel-top">
          <h2 id="auth-title">Acessar conta</h2>
          <p id="auth-subtitle">Faça login ou crie um novo cadastro.</p>
          <button id="theme-toggle" class="ghost-btn" type="button" aria-label="Alternar tema">Tema</button>
        </div>

        <section id="logged-panel" class="logged-panel hidden">
          <p id="logged-message">Você está logado.</p>
          <div class="form-actions">
            <a href="index.html" class="secondary-btn">Ir para agendamento</a>
            <button type="button" class="ghost-btn" id="logout-btn">Sair da conta</button>
          </div>
        </section>

        <section id="auth-panel">
          <div class="auth-tabs">
            <button id="tab-login" class="secondary-btn" type="button">Login</button>
            <button id="tab-register" class="ghost-btn" type="button">Cadastrar</button>
          </div>

          <form id="login-form" class="booking-form" novalidate>
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" required autocomplete="email" />
              <small class="field-error" id="error-login-email"></small>
            </div>

            <div class="form-group">
              <label for="login-password">Senha</label>
              <input type="password" id="login-password" required autocomplete="current-password" />
              <small class="field-error" id="error-login-password"></small>
            </div>

            <div class="form-actions">
              <button type="submit" class="submit-btn">Entrar</button>
            </div>
          </form>

          <form id="register-form" class="booking-form hidden" novalidate>
            <div class="form-group">
              <label for="register-name">Nome completo</label>
              <input type="text" id="register-name" required maxlength="80" autocomplete="name" />
              <small class="field-error" id="error-register-name"></small>
            </div>

            <div class="form-group">
              <label for="register-email">Email</label>
              <input type="email" id="register-email" required maxlength="120" autocomplete="email" />
              <small class="field-error" id="error-register-email"></small>
            </div>

            <div class="form-group">
              <label for="register-phone">Telefone</label>
              <input type="tel" id="register-phone" placeholder="(99) 99999-9999" maxlength="20" autocomplete="tel" />
              <small class="field-error" id="error-register-phone"></small>
            </div>

            <div class="form-group">
              <label for="register-password">Senha</label>
              <input type="password" id="register-password" required autocomplete="new-password" />
              <small class="field-error" id="error-register-password"></small>
            </div>

            <div class="form-group">
              <label for="register-password-confirm">Confirmar senha</label>
              <input type="password" id="register-password-confirm" required autocomplete="new-password" />
              <small class="field-error" id="error-register-password-confirm"></small>
            </div>

            <div class="form-actions">
              <button type="submit" class="submit-btn">Criar conta</button>
            </div>
          </form>
        </section>

        <div class="auth-footer">
          <a href="index.html" class="ghost-btn">Voltar</a>
        </div>
      </div>
    </section>
  </main>

  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item"><span class="material-symbols-outlined">home</span><span>Início</span></a>
    <a href="agendamentos.html" class="mobile-nav-item"><span class="material-symbols-outlined">calendar_today</span><span>Agenda</span></a>
    <a href="auth.html" class="mobile-nav-item active"><span class="material-symbols-outlined">person</span><span>Perfil</span></a>
  </nav>

  <div class="toast" id="toast"></div>

  <script type="module" src="auth.js"></script>
  <script src="theme.js"></script>
</body>
</html>
